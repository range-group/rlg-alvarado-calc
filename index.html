<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Range Land Group — Alvarado Deal Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F0F5;--card:#fff;--border:#E2E2EA;--subtle:#F7F7FA;
  --text:#0C0C0E;--muted:#87878F;--faint:#C4C4CC;
  --blue:#1A56DB;--green:#12916A;--red:#D93F3F;--amber:#B06A14;
  --green-bg:#EBF7F3;--red-bg:#FDF0F0;--amber-bg:#FDF3E7;
  --mono:'DM Mono',monospace;--sans:'DM Sans',-apple-system,sans-serif;
}
html{font-size:15px;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;}
.page{max-width:680px;margin:0 auto;padding-bottom:6rem;}

/* ── HEADER ─────────────────────────────────── */
.hdr{padding:1.5rem 1.25rem 1rem;display:flex;justify-content:space-between;align-items:flex-start;}
.brand-mark{font-size:22px;font-weight:700;letter-spacing:-.03em;line-height:1.1;color:var(--text);}
.brand-mark em{font-style:normal;color:var(--blue);}
.brand-tag{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.01em;}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-family:var(--sans);}
.pill.primary{background:var(--text);color:#fff;border-color:var(--text);}
.pill.version{color:var(--blue);border-color:var(--blue);cursor:default;font-family:var(--mono);}
.hdr-divider{height:1px;background:var(--border);margin:0 1.25rem;}

/* ── PROFIT HERO ─────────────────────────────── */
.hero{margin:1rem 1.25rem .5rem;background:var(--text);border-radius:18px;padding:1.25rem;color:#fff;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);}
.hero-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.5;margin-bottom:6px;}
.hero-profit{font-family:var(--mono);font-size:36px;font-weight:500;letter-spacing:-.02em;line-height:1;margin-bottom:14px;}
.hero-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.12);border-radius:10px;overflow:hidden;}
.hero-cell{background:rgba(255,255,255,.06);padding:.6rem .75rem;}
.hero-cell-label{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.5;margin-bottom:3px;}
.hero-cell-val{font-family:var(--mono);font-size:13px;font-weight:500;}
.profit-bar-wrap{height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:4px;overflow:hidden;}
.profit-bar{height:3px;border-radius:2px;background:#fff;transition:width .3s;}

/* ── KPI STRIP ───────────────────────────────── */
.kpi-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:0 1.25rem .375rem;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.75rem .875rem;}
.kpi-label{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.kpi-val{font-family:var(--mono);font-size:17px;font-weight:500;}
.kpi-sub{font-size:10.5px;color:var(--muted);margin-top:2px;}

/* ── SECTION ─────────────────────────────────── */
.sec{padding:1rem 1.25rem .4rem;display:flex;align-items:center;gap:10px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--border);}

/* ── CARD ────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin:0 1.25rem .625rem;overflow:hidden;}

/* ── INPUT ROW ───────────────────────────────── */
.ir{display:flex;align-items:center;padding:0 1rem;border-bottom:1px solid var(--border);min-height:48px;gap:10px;}
.ir:last-child{border-bottom:none;}
.ir-label{flex:1;min-width:0;}
.ir-label-text{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ir-label-sub{font-size:10.5px;color:var(--muted);margin-top:1px;line-height:1.3;}
.ir-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sym{font-size:13px;color:var(--muted);font-family:var(--mono);}

input[type=number]{
  font-family:var(--mono);font-size:13.5px;font-weight:500;
  width:114px;text-align:right;padding:7px 10px;
  border:1.5px solid var(--border);border-radius:9px;
  background:var(--subtle);color:var(--text);height:38px;
  -moz-appearance:textfield;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number].w-sm{width:68px;}
input[type=number].w-xs{width:52px;}
input[type=number]:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,.08);}

input[type=text]{
  width:100%;padding:10px 12px;font-size:13.5px;
  font-family:var(--sans);border:1.5px solid var(--border);
  border-radius:10px;background:var(--subtle);color:var(--text);
}
input[type=text]:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,.08);}
input[type=text]::placeholder,input[type=number]::placeholder{color:var(--faint);}
textarea{width:100%;padding:10px 12px;font-size:13px;font-family:var(--sans);border:1.5px solid var(--border);border-radius:10px;background:var(--subtle);color:var(--text);resize:vertical;min-height:64px;line-height:1.5;}
textarea:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(26,86,219,.08);}
.deal-field{padding:.75rem 1rem;}
.deal-field+.deal-field{border-top:1px solid var(--border);}
.deal-label{font-size:11.5px;font-weight:600;margin-bottom:5px;display:block;}

/* ── TOGGLE ──────────────────────────────────── */
.tog{display:flex;border:1.5px solid var(--border);border-radius:9px;overflow:hidden;background:var(--subtle);}
.tog-btn{flex:1;padding:0 10px;font-size:12.5px;font-weight:600;font-family:var(--sans);border:none;border-right:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;height:38px;white-space:nowrap;transition:background .15s,color .15s;}
.tog-btn:last-child{border-right:none;}
.tog-btn.sel-0{background:var(--text);color:#fff;}
.tog-btn.sel-3{background:var(--amber);color:#fff;}
.tog-btn.sel-6{background:var(--red);color:#fff;}
.tog-btn.sel-on{background:var(--blue);color:#fff;}
.tog-result{font-family:var(--mono);font-size:12.5px;font-weight:500;min-width:70px;text-align:right;color:var(--muted);}

/* ── LINE ITEMS ──────────────────────────────── */
.li{display:grid;grid-template-columns:1fr auto auto auto auto auto auto;align-items:center;gap:6px;padding:7px 1rem;border-bottom:1px solid var(--border);}
.li-locked{background:#FAFFFE;}
.li-hidden{background:#FDFAFA;}
.li.li-hidden input[type=text]{text-decoration:line-through;color:#8A6A6A;}
.li-lock:hover,.li-type:hover,.li-hide:hover{background:rgba(0,0,0,.04);}
.li:last-child{border-bottom:none;}
.li input[type=text]{font-size:13px;}
.li input[type=number]{width:106px;}
.li-del{width:28px;height:28px;border:1.5px solid var(--border);border-radius:7px;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.li-del:hover{background:var(--red-bg);color:var(--red);border-color:var(--red);}
.li-add{display:block;width:calc(100% - 2.5rem);margin:.375rem 1.25rem .125rem;padding:8px;font-size:12.5px;font-weight:500;font-family:var(--sans);border:1.5px dashed var(--border);border-radius:10px;background:transparent;color:var(--muted);cursor:pointer;text-align:center;}
.li-add:hover{border-color:var(--blue);color:var(--blue);background:rgba(26,86,219,.04);}

/* ── SUBTOTALS / INFO ────────────────────────── */
.strow{display:flex;justify-content:space-between;align-items:center;padding:9px 1rem;border-top:1px solid var(--border);font-size:12.5px;font-weight:700;}
.inforow{display:flex;justify-content:space-between;align-items:center;padding:7px 1rem;background:var(--subtle);border-bottom:1px solid var(--border);font-size:12px;}
.inforow:last-child{border-bottom:none;}
.inforow-label{color:var(--muted);}
.inforow-val{font-family:var(--mono);font-weight:500;}

/* ── SLIDER ──────────────────────────────────── */
.slider-wrap{padding:10px 1rem 9px;border-bottom:1px solid var(--border);}
.slider-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
.slider-title{font-size:13.5px;color:var(--text);}
.slider-num{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--blue);}
input[type=range]{width:100%;height:4px;accent-color:var(--blue);cursor:pointer;margin-bottom:2px;}
.slider-sub{font-size:11px;color:var(--muted);margin-top:3px;}

/* ── DURATION IMPACT ─────────────────────────── */
.dur-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-bottom:1px solid var(--border);}
.dur-cell{padding:10px 1rem;border-right:1px solid var(--border);background:var(--subtle);}
.dur-cell:last-child{border-right:none;}
.dur-mo{font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.dur-val{font-family:var(--mono);font-size:13.5px;font-weight:500;}

/* ── OUTPUT ROWS ─────────────────────────────── */
.or{display:flex;justify-content:space-between;align-items:center;padding:8px 1rem;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.or:last-child{border-bottom:none;}
.or.sub{padding-left:2rem;background:var(--subtle);}
.or.sub .ol,.or.sub .ov{font-size:12px;}
.ol{color:var(--muted);flex:1;}
.ov{font-family:var(--mono);font-weight:500;flex-shrink:0;}
.tot-row{display:flex;justify-content:space-between;align-items:center;padding:12px 1rem;border-top:1.5px solid var(--border);font-size:14px;font-weight:700;}
.tot-row .ov{font-size:15px;}
.divl{height:1px;background:var(--border);}
.profit-row{display:flex;justify-content:space-between;align-items:center;padding:13px 1rem 8px;}
.profit-lbl{font-size:15px;font-weight:700;}
.profit-num{font-family:var(--mono);font-size:26px;font-weight:500;}
.stat-strip{display:flex;gap:5px;padding:0 1rem 12px;}
.stat{flex:1;background:var(--subtle);border-radius:8px;padding:7px 4px;text-align:center;}
.stat-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.stat-val{font-family:var(--mono);font-size:13px;font-weight:500;}

/* ── LOT TABLE ───────────────────────────────── */
.lot-wrap{overflow-x:auto;margin:0 1.25rem .875rem;}
.lot-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;min-width:520px;}
table{width:100%;border-collapse:collapse;}
th{font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:10px 1rem;border-bottom:1.5px solid var(--border);text-align:right;white-space:nowrap;}
th:first-child{text-align:left;}
